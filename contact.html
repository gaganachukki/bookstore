<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Stackly</title>
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/books.css"> <!-- For page-header -->
    <link rel="stylesheet" href="css/contact.css">
</head>
<body>

    <div id="header-placeholder"></div>

    <main>
        <section class="page-header" style="background-image: linear-gradient(rgba(28, 21, 17, 0.8), rgba(28, 21, 17, 0.8)), url('assets/hero_contact.webp'); background-size: cover; background-position: center;">
            <div class="container">
                <h1>Get in Touch</h1>
                <p>Have a question or need assistance? We're always here to help.</p>
            </div>
        </section>

        <section class="contact-section container">
            <div class="contact-grid">
                <div class="contact-info-card">
                    <h3>Contact Information</h3>
                    
                    <div class="info-item">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                        <div>
                            <h5>Our Location</h5>
                            <p>123 Bookworm Lane, Reading District, NY 10001</p>
                        </div>
                    </div>
                    
                    <div class="info-item">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                        <div>
                            <h5>Phone Number</h5>
                            <p>+1 (555) 123-4567<br>Mon-Fri, 9am - 6pm EST</p>
                        </div>
                    </div>

                    <div class="info-item">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                        <div>
                            <h5>Email Address</h5>
                            <p>support@stackly.com<br>hello@stackly.com</p>
                        </div>
                    </div>
                </div>

                <div class="contact-form-card">
                    <h3>Send us a Message</h3>
                    <form action="#" method="POST">
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                            <div class="form-group">
                                <label for="firstName">First Name</label>
                                <input type="text" id="firstName" class="form-control" placeholder="Jane" required>
                            </div>
                            <div class="form-group">
                                <label for="lastName">Last Name</label>
                                <input type="text" id="lastName" class="form-control" placeholder="Doe" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="email">Email Address</label>
                            <input type="email" id="email" class="form-control" placeholder="jane@example.com" required>
                        </div>
                        <div class="form-group">
                            <label for="subject">Subject</label>
                            <input type="text" id="subject" class="form-control" placeholder="How can we help?" required>
                        </div>
                        <div class="form-group">
                            <label for="message">Message</label>
                            <textarea id="message" class="form-control" placeholder="Write your message here..." required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary btn-submit">Send Message</button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>

    <script src="js/script.js"></script>
</body>
</html>
